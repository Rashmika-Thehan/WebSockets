<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Live Test</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #121212;
            color: #fff;
        }
        #log {
            background: #000;
            padding: 10px;
            height: 300px;
            overflow-y: scroll;
            border: 1px solid #333;
        }
        .status-on { color: #00ff00;}
        .status-off { color: #ff0000;}
    </style>
</head>


<body>
    <h1> WebSocket Broadcast Console</h1>
    <p id="status" class="status-off">Connecting...</p>

    <form id="message-form">
        <input id="message-input" type="text" placeholder="Type a message..." required>
        <button type="submit">Send</button>
    </form>
    <h3>Live Stream Logs:</h3>
    <pre id="log"></pre>
</body>


<script>
    const statusEl = document.getElementById('status');
    const log = document.getElementById('log');
    const input = document.getElementById('message-input');

    // 1. Initialize the handshake
    const socket = new WebSocket('ws://localhost:8080');

    const appendLog = (label, message) => {
        const entry = `${new Date().toLocaleTimeString()} - ${label} ${message}\n`
        log.textContent = entry + log.textContent;
    }

    socket.addEventListener('open', () => {
        statusEl.textContent = 'CONNECTED: ws://localhost:8080';
        statusEl.className = 'status-on';
        appendLog('[SYSTEM]', 'Tunnel Established');
    });

    socket.addEventListener('close', () => {
        statusEl.textContent = 'DISCONNECTED';
        statusEl.className = 'status-off';
        appendLog('[SYSTEM]', 'Tunnel Closed');
    });

    //Receives a Message
    //When a message arrives from the server, the browser Creates a MessageEvent object (e), and Populates it with the message data
    socket.addEventListener('message', (e) => {
        appendLog('[RECEIVED]', e.data);
    });

    // Sending a Message
    // Arrow function receives the event object. The Event object in JavaScript contains information about what just happened
    document.getElementById('message-form').addEventListener('submit', (e) => {  
        e.preventDefault(); // stops the browser's default behavior (def  behavior:- Send data to a server, Reload the page, Change the URL)
        if (socket.readyState !== WebSocket.OPEN) {
            appendLog('[ERROR]', 'No Active Tunnel');
        }

        const message = input.value.trim();
        socket.send(message);  // This sends the message
        appendLog('[SENT]', message);
        input.value = '';
    });
</script>

</html>
